version: 2
updates:
  # Monitor OpenTofu/Terraform provider versions
  - package-ecosystem: "terraform"
    directory: "/infrastructure"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "component:infrastructure"
    commit-message:
      prefix: "chore(deps)"

  # Monitor GitHub Actions versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "component:infrastructure"
    commit-message:
      prefix: "chore(deps)"
